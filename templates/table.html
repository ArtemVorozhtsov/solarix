{% extends "base.html" %}
{% block title %}Таблица данных{% endblock %}

{% block content %}
  <h1>Таблица данных</h1>
  <table class="table table-bordered table-striped">
    <thead class="table-dark">
      <tr>
        <th>Дата</th>
        <th>T1</th>
        <th>T2</th>
        <th>He Level</th>
      </tr>
    </thead>
    <tbody>
      {% for index, row in log_df.iterrows() %}
        <tr>
          <td>{{ row.Date }}</td>
          <td>{{ row.T1 }}</td>
          <td>{{ row.T2 }}</td>
          <td>{{ row.He_level }}</td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}

<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Гелиевый мониторинг{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

  <!-- Ресурсы Bokeh -->
  <link href="https://cdn.bokeh.org/bokeh/release/bokeh-3.3.0.min.css" rel="stylesheet">
  <link href="https://cdn.bokeh.org/bokeh/release/bokeh-widgets-3.3.0.min.css" rel="stylesheet">
  <link href="https://cdn.bokeh.org/bokeh/release/bokeh-tables-3.3.0.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" href="/">Ввод данных</a></li>
          <li class="nav-item"><a class="nav-link" href="/graphs">Графики</a></li>
          <li class="nav-item"><a class="nav-link" href="/table">Таблица</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <div class="container mt-4">
    {% block content %}{% endblock %}
  </div>

  <!-- Скрипты Bokeh в конце body -->
  <script src="https://cdn.bokeh.org/bokeh/release/bokeh-3.3.0.min.js"></script>
  <script src="https://cdn.bokeh.org/bokeh/release/bokeh-widgets-3.3.0.min.js"></script>
  <script src="https://cdn.bokeh.org/bokeh/release/bokeh-tables-3.3.0.min.js"></script>
  
  {% block bokeh_scripts %}{% endblock %}
</body>
</html>
